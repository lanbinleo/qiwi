<div style="max-width:560px;margin:0 auto;font-family:'HarmonyOS Sans','HarmonyOS Sans SC','Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#3f3f46;background:#fafaf9;border-radius:12px;overflow:hidden;border:1px solid #e4e4e7;">

  <!-- 顶部焦糖色条 -->
  <div style="height:6px;background:linear-gradient(90deg,#8b7355,#d4c4b0);"></div>

  <!-- 头部 -->
  <div style="padding:32px 32px 0 32px;">
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 10px 0;letter-spacing:0.3px;">{{siteTitle}} · 新评论通知</p>
    <h2 style="font-size:18px;font-weight:600;margin:0;line-height:1.5;">
      <a href="{{permalink}}" target="_blank" style="color:#8b7355;text-decoration:none;">《{{title}}》</a>
      <span style="font-weight:400;color:#3f3f46;">收到了新评论</span>
    </h2>
  </div>

  <!-- 内容区 -->
  <div style="padding:24px 32px 32px 32px;">

    <!-- 评论者 + 时间 -->
    <p style="font-size:15px;margin:0 0 4px 0;">
      <strong style="color:#3f3f46;">{{author}}</strong>
      <span style="color:#71717a;">&nbsp;说：</span>
    </p>
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 12px 0;">{{time}}</p>

    <!-- 评论内容 -->
    <div style="background:#f4f3f0;border-radius:8px;padding:14px 18px;font-size:15px;line-height:1.7;color:#3f3f46;margin:0 0 24px 0;border-left:3px solid #d4c4b0;">
      {{text}}
    </div>

    <!-- 详细信息 -->
    <p style="font-size:13px;color:#71717a;margin:0 0 8px 0;">评论者信息</p>
    <table style="font-size:13px;color:#71717a;line-height:2;border-collapse:collapse;width:100%;background:#f4f3f0;border-radius:8px;padding:12px 16px;">
      <tr>
        <td style="padding:8px 16px;white-space:nowrap;color:#a1a1aa;width:50px;">IP</td>
        <td style="padding:8px 0;">{{ip}}</td>
      </tr>
      <tr>
        <td style="padding:8px 16px;white-space:nowrap;color:#a1a1aa;">邮箱</td>
        <td style="padding:8px 0;">
          <a href="mailto:{{mail}}" style="color:#8b7355;text-decoration:none;">{{mail}}</a>
        </td>
      </tr>
      <tr>
        <td style="padding:8px 16px;white-space:nowrap;color:#a1a1aa;">状态</td>
        <td style="padding:8px 0;">{{status}}</td>
      </tr>
    </table>

    <!-- 操作按钮 -->
    <div style="text-align:center;padding-top:28px;">
      <a href="{{permalink}}" target="_blank" style="display:inline-block;background:#8b7355;color:#ffffff;font-size:14px;font-weight:500;padding:10px 28px;border-radius:999px;text-decoration:none;letter-spacing:0.3px;">查看评论</a>
      <span style="display:inline-block;width:12px;"></span>
      <a href="{{manage}}" target="_blank" style="display:inline-block;background:#ffffff;color:#8b7355;font-size:14px;font-weight:500;padding:9px 28px;border-radius:999px;text-decoration:none;letter-spacing:0.3px;border:1px solid #d4c4b0;">管理评论</a>
    </div>
  </div>

  <!-- 底部 -->
  <div style="border-top:1px solid #e4e4e7;padding:16px 32px;text-align:center;">
    <p style="font-size:11px;color:#a1a1aa;margin:0;">© {{siteTitle}}</p>
  </div>

</div>
