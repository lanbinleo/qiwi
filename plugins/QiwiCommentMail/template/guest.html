<div style="max-width:560px;margin:0 auto;font-family:'HarmonyOS Sans','HarmonyOS Sans SC','Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#3f3f46;background:#fafaf9;border-radius:12px;overflow:hidden;border:1px solid #e4e4e7;">

  <!-- 顶部焦糖色条 -->
  <div style="height:6px;background:linear-gradient(90deg,#8b7355,#d4c4b0);"></div>

  <!-- 头部 -->
  <div style="padding:32px 32px 0 32px;">
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 10px 0;letter-spacing:0.3px;">{{siteTitle}}</p>
    <p style="font-size:15px;color:#71717a;margin:0 0 6px 0;">Dear {{author_p}}，</p>
    <h2 style="font-size:18px;font-weight:600;margin:0;line-height:1.5;">
      <span style="font-weight:400;color:#3f3f46;">您在</span>
      <a href="{{permalink}}" target="_blank" style="color:#8b7355;text-decoration:none;">《{{title}}》</a>
      <span style="font-weight:400;color:#3f3f46;">的评论有了新回复</span>
    </h2>
  </div>

  <!-- 内容区 -->
  <div style="padding:24px 32px 32px 32px;">

    <!-- 原评论 -->
    <p style="font-size:13px;color:#a1a1aa;margin:0 0 8px 0;">您的评论</p>
    <div style="background:#f4f3f0;border-radius:8px;padding:14px 18px;font-size:15px;line-height:1.7;color:#71717a;margin:0 0 24px 0;border-left:3px solid #e4e4e7;">
      {{text_p}}
    </div>

    <!-- 新回复 -->
    <p style="font-size:15px;margin:0 0 4px 0;">
      <strong style="color:#3f3f46;">{{author}}</strong>
      <span style="color:#71717a;">&nbsp;回复了您：</span>
    </p>
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 12px 0;">{{time}}</p>
    <div style="background:#f4f3f0;border-radius:8px;padding:14px 18px;font-size:15px;line-height:1.7;color:#3f3f46;margin:0 0 28px 0;border-left:3px solid #d4c4b0;">
      {{text}}
    </div>

    <!-- 按钮 -->
    <div style="text-align:center;">
      <a href="{{permalink}}" target="_blank" style="display:inline-block;background:#8b7355;color:#ffffff;font-size:14px;font-weight:500;padding:10px 32px;border-radius:999px;text-decoration:none;letter-spacing:0.3px;">查看完整内容</a>
    </div>
  </div>

  <!-- 底部 -->
  <div style="border-top:1px solid #e4e4e7;padding:20px 32px;text-align:center;">
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 6px 0;line-height:1.6;">本邮件为系统自动发送，请勿直接回复</p>
    <p style="font-size:12px;color:#a1a1aa;margin:0 0 4px 0;">
      如有疑问，请<a href="{{contactme}}" style="color:#8b7355;text-decoration:none;">联系博主</a>
    </p>
    <p style="font-size:11px;color:#a1a1aa;margin:0;">© {{siteTitle}}</p>
  </div>

</div>
